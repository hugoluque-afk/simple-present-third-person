<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grammar Balloons - Learn English</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animaciones base de los globos */
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
        }
        .animate-float-up {
            animation: floatUp 1s ease-out forwards;
        }
        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-5px) rotate(2deg); }
        }
        .balloon-idle {
            animation: gentleFloat 3s ease-in-out infinite;
        }
        
        /* Animación de partículas de explosión */
        @keyframes popParticle {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            animation: popParticle 0.6s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
            pointer-events: none;
            z-index: 25;
        }

        /* Animación de pulso del combo */
        @keyframes comboPulse {
            0% { transform: scale(1); text-shadow: 0 0 10px #fbbf24; }
            50% { transform: scale(1.3); text-shadow: 0 0 30px #f59e0b; }
            100% { transform: scale(1); text-shadow: 0 0 10px #fbbf24; }
        }
        .combo-text {
            animation: comboPulse 0.4s ease-out;
        }

        /* Animación de cuenta regresiva */
        @keyframes popIn {
            0% { transform: scale(0.3); opacity: 0; }
            60% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop-in {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Animación del ecualizador de música */
        @keyframes eq {
            0% { height: 4px; }
            100% { height: 20px; }
        }
        .eq-bar {
            width: 5px;
            background-color: #34d399; /* emerald-400 */
            border-radius: 3px;
            animation: eq 0.5s ease-in-out infinite alternate;
        }
        .eq-bar:nth-child(1) { animation-duration: 0.4s; }
        .eq-bar:nth-child(2) { animation-duration: 0.7s; animation-delay: 0.1s; }
        .eq-bar:nth-child(3) { animation-duration: 0.5s; animation-delay: 0.2s; }
        .eq-bar:nth-child(4) { animation-duration: 0.6s; animation-delay: 0.3s; }
        
        .music-paused .eq-bar {
            animation: none !important;
            height: 4px !important;
            background-color: #94a3b8; /* slate-400 */
        }

        /* Utilidad para ocultar elementos */
        .hidden-state {
            display: none !important;
        }
    </style>
</head>
<body class="font-sans antialiased overflow-hidden select-none bg-gray-900">

    <!-- Elemento de música de fondo -->
    <audio id="bg-music" loop preload="auto">
        <!-- Pista alegre de videojuego arcade -->
        <source src="https://assets.mixkit.co/music/preview/mixkit-fun-video-game-background-2832.mp3" type="audio/mpeg">
    </audio>

    <div id="game-wrapper" class="relative w-full h-screen max-h-screen transition-colors duration-1000 bg-gradient-to-b from-sky-500 to-indigo-600">
        
        <!-- --- INTERFAZ PRINCIPAL (HUD) --- -->
        <div id="hud" class="hidden-state absolute top-0 left-0 w-full p-4 flex justify-between items-start z-30 text-white drop-shadow-md">
            <!-- Izquierda: Nivel, Controles y Dificultad -->
            <div class="flex flex-col gap-2">
                <div class="flex items-center gap-4 bg-white/10 px-5 py-2 rounded-full border border-white/20 backdrop-blur-md shadow-lg">
                    <button id="btn-pause-play" class="hover:scale-110 transition-transform cursor-pointer text-yellow-300">
                        <!-- SVG inyectado por JS -->
                    </button>
                    <!-- Control de música en el juego (Ecualizador) -->
                    <button id="btn-music-hud" onclick="toggleBgm()" class="flex items-center gap-[2px] h-6 cursor-pointer hover:opacity-80 transition-opacity pl-4 border-l border-white/30" title="Toggle Music">
                        <div id="hud-eq" class="flex items-end gap-[3px] h-5">
                            <div class="eq-bar"></div>
                            <div class="eq-bar"></div>
                            <div class="eq-bar"></div>
                            <div class="eq-bar"></div>
                        </div>
                    </button>
                    <div class="font-bold text-lg uppercase tracking-wider pl-4 border-l border-white/30">Level <span id="hud-level" class="text-2xl text-yellow-300 ml-1">1</span></div>
                </div>
                <div id="hud-diff" class="text-xs font-bold uppercase tracking-widest text-center opacity-90 bg-black/40 rounded-full py-1.5 shadow-inner border border-white/10">Normal</div>
            </div>
            
            <!-- Centro: Temporizador -->
            <div class="flex flex-col items-center bg-white/10 border border-white/20 px-8 py-2 rounded-3xl backdrop-blur-md shadow-lg mt-1">
                <div class="text-xs font-bold opacity-80 uppercase tracking-widest text-blue-100">Time</div>
                <div id="hud-time" class="text-4xl font-black text-white drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)] tracking-tight">00:30</div>
            </div>

            <!-- Derecha: Puntaje y Vidas -->
            <div class="flex items-center gap-6 bg-white/10 border border-white/20 px-5 py-2 rounded-full backdrop-blur-md shadow-lg">
                <div class="flex flex-col items-center min-w-[80px]">
                    <div class="text-xs font-bold opacity-80 uppercase text-green-200 tracking-widest">Score</div>
                    <div id="hud-score" class="font-black text-2xl tracking-tight">0</div>
                    <div id="hud-combo" class="text-xs font-bold text-yellow-400 h-4 transition-all"></div>
                </div>
                <div id="hud-lives" class="flex gap-1 border-l border-white/30 pl-4">
                    <!-- Corazones inyectados por JS -->
                </div>
            </div>
        </div>

        <!-- --- LIENZO DEL JUEGO --- -->
        <div id="game-canvas" class="hidden-state absolute inset-0 z-10">
            <div id="balloons-container" class="absolute inset-0"></div>
            <div id="particles-container" class="absolute inset-0 pointer-events-none"></div>
            <div id="floating-texts-container" class="absolute inset-0 pointer-events-none"></div>

            <!-- Tablero del Sujeto -->
            <div class="absolute bottom-16 left-1/2 transform -translate-x-1/2 flex flex-col items-center z-20">
                <div class="text-white/90 font-bold mb-3 uppercase tracking-widest drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] text-sm bg-black/40 px-5 py-1.5 rounded-full border border-white/10 backdrop-blur-sm">
                    Select the correct verb
                </div>
                <div class="bg-[#2A1B0E] border-[4px] border-[#4A311A] rounded-2xl py-5 px-20 shadow-[0_15px_35px_rgba(0,0,0,0.5)] relative overflow-hidden group">
                   <div class="absolute inset-0 opacity-20 pointer-events-none bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4IiBoZWlnaHQ9IjgiPgo8cmVjdCB3aWR0aD0iOCIgaGVpZ2h0PSI4IiBmaWxsPSIjZmZmIiAvPgo8cGF0aCBkPSJNMCAwTDggOFpNOCAwTDAgOFoiIHN0cm9rZT0iIzAwMCIgc3Ryb2tlLXdpZHRoPSIxIiAvPjwvc3ZnPg==')] mix-blend-overlay"></div>
                   <span id="current-subject" class="text-5xl md:text-6xl text-white font-black tracking-wide drop-shadow-[0_4px_6px_rgba(0,0,0,0.8)] relative z-10 transition-all">Ready...</span>
                </div>
                <div class="flex gap-40 -mt-2 -z-10 opacity-90">
                  <div class="w-6 h-32 bg-gradient-to-b from-[#3E2105] to-[#1A0E02] shadow-2xl rounded-b-sm border-x border-black/30"></div>
                  <div class="w-6 h-32 bg-gradient-to-b from-[#3E2105] to-[#1A0E02] shadow-2xl rounded-b-sm border-x border-black/30"></div>
                </div>
            </div>
        </div>

        <!-- --- MENÚS (Superposiciones) --- -->
        
        <!-- Menú Principal -->
        <div id="menu-overlay" class="absolute inset-0 bg-gradient-to-br from-slate-900 via-indigo-900 to-slate-900 flex flex-col items-center justify-center z-50">
            <!-- Elementos decorativos de fondo -->
            <div class="absolute top-20 left-20 w-32 h-40 bg-pink-600/20 rounded-t-full rounded-b-[45%] animate-bounce blur-sm"></div>
            <div class="absolute bottom-32 right-32 w-40 h-52 bg-blue-600/20 rounded-t-full rounded-b-[45%] animate-pulse blur-sm"></div>
            <div class="absolute top-40 right-40 w-24 h-32 bg-yellow-500/10 rounded-t-full rounded-b-[45%] animate-pulse blur-sm" style="animation-delay: 1s;"></div>

            <div class="bg-white/10 p-12 md:p-16 rounded-[2.5rem] backdrop-blur-xl border border-white/20 text-center shadow-[0_20px_60px_rgba(0,0,0,0.5)] flex flex-col items-center relative z-10 w-11/12 max-w-2xl">
                <div class="flex gap-3 mb-8">
                   <div class="w-10 h-14 bg-rose-500 rounded-t-full rounded-b-[45%] shadow-[inset_-4px_-4px_10px_rgba(0,0,0,0.3)] opacity-90"></div>
                   <div class="w-12 h-16 bg-blue-500 rounded-t-full rounded-b-[45%] -mt-4 shadow-[inset_-4px_-4px_10px_rgba(0,0,0,0.3)]"></div>
                   <div class="w-10 h-14 bg-emerald-500 rounded-t-full rounded-b-[45%] shadow-[inset_-4px_-4px_10px_rgba(0,0,0,0.3)] opacity-90"></div>
                </div>
                <h1 class="text-5xl md:text-7xl font-black text-white drop-shadow-[0_4px_12px_rgba(0,0,0,0.6)] mb-3 leading-tight tracking-tight">
                    Grammar<br><span class="text-yellow-400 bg-clip-text">Balloons</span>
                </h1>
                <p class="text-lg md:text-xl text-indigo-100 font-semibold mb-10 drop-shadow-md bg-black/30 px-6 py-2 rounded-full border border-white/10 uppercase tracking-widest">
                    Simple Present (3rd Person)
                </p>
                
                <div class="mb-12 w-full">
                    <p class="text-white/80 font-semibold mb-4 uppercase tracking-widest text-sm">Select Difficulty</p>
                    <div class="flex flex-col md:flex-row gap-4 justify-center w-full">
                        <button onclick="setDifficulty(1)" id="diff-btn-1" class="diff-btn flex-1 bg-emerald-600 text-white px-5 py-4 rounded-xl font-bold shadow-[0_4px_0_#064e3b] transition-all transform hover:-translate-y-1"> Beginner </button>
                        <button onclick="setDifficulty(2)" id="diff-btn-2" class="diff-btn flex-1 bg-slate-600 opacity-70 text-white px-5 py-4 rounded-xl font-bold transition-all transform hover:-translate-y-1"> Normal </button>
                        <button onclick="setDifficulty(3)" id="diff-btn-3" class="diff-btn flex-1 bg-slate-600 opacity-70 text-white px-5 py-4 rounded-xl font-bold transition-all transform hover:-translate-y-1"> Advanced </button>
                    </div>
                </div>
                
                <button onclick="startGame()" class="bg-gradient-to-r from-yellow-400 to-yellow-500 hover:from-yellow-300 hover:to-yellow-400 text-yellow-900 font-black text-3xl py-5 px-20 rounded-full shadow-[0_8px_0_#9a6324,0_15px_20px_rgba(0,0,0,0.4)] hover:shadow-[0_4px_0_#9a6324,0_10px_10px_rgba(0,0,0,0.4)] active:shadow-none active:translate-y-2 transition-all mb-8 flex items-center gap-4 group">
                    <svg class="group-hover:animate-ping absolute opacity-0 group-hover:opacity-30" width="36" height="36" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="relative z-10"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    PLAY
                </button>
                
                <button onclick="openSettings()" class="text-white/70 hover:text-white font-medium flex items-center gap-2 text-sm bg-white/5 px-6 py-3 rounded-full hover:bg-white/10 transition-colors border border-white/5">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    Settings
                </button>
            </div>

            <!-- Créditos (Desarrollado por Hugo Luque) -->
            <div class="absolute bottom-6 text-white/50 text-sm font-semibold tracking-wider uppercase">
                Developed by Hugo Luque
            </div>
        </div>

        <!-- Superposición de cuenta regresiva -->
        <div id="countdown-overlay" class="hidden-state absolute inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-40">
            <div id="countdown-text" class="text-9xl md:text-[12rem] font-black drop-shadow-[0_0_30px_rgba(250,204,21,0.8)]">
                3
            </div>
        </div>

        <!-- Menú de Pausa -->
        <div id="paused-overlay" class="hidden-state absolute inset-0 bg-slate-900/80 backdrop-blur-xl flex items-center justify-center z-50">
            <div class="bg-white/10 border border-white/20 p-12 rounded-[2rem] text-center shadow-[0_0_50px_rgba(0,0,0,0.5)] min-w-[380px]">
                <h2 class="text-4xl font-black text-white mb-10 uppercase tracking-widest drop-shadow-md">Paused</h2>
                <div class="flex flex-col gap-4">
                    <button onclick="setGameState('countdown_resume')" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold text-xl py-4 px-8 rounded-xl shadow-[0_4px_0_#064e3b] active:shadow-none active:translate-y-1 transition-all flex justify-center items-center gap-3">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg> Resume
                    </button>
                    <button onclick="startGame()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xl py-4 px-8 rounded-xl shadow-[0_4px_0_#312e81] active:shadow-none active:translate-y-1 transition-all flex justify-center items-center gap-3">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg> Restart Level
                    </button>
                    <button onclick="openSettings()" class="bg-white/10 hover:bg-white/20 text-white font-bold text-xl py-4 px-8 rounded-xl border border-white/10 transition-all flex justify-center items-center gap-3">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg> Settings
                    </button>
                    <button onclick="setGameState('menu')" class="text-white/50 hover:text-rose-400 font-semibold mt-6 flex justify-center items-center gap-2 transition-colors">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg> Exit to Menu
                    </button>
                </div>
            </div>
        </div>

        <!-- Menú de Ajustes -->
        <div id="settings-overlay" class="hidden-state absolute inset-0 bg-slate-900/90 backdrop-blur-xl flex items-center justify-center z-50">
            <div class="bg-slate-800 border border-slate-700 p-10 rounded-[2rem] text-center shadow-2xl min-w-[380px] relative">
                <button onclick="closeSettings()" class="absolute top-6 right-6 text-slate-400 hover:text-white transition-colors">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
                <h2 class="text-3xl font-black text-white mb-10 tracking-wide">Settings</h2>
                
                <div class="flex flex-col gap-6">
                    <div class="flex justify-between items-center bg-slate-700/50 p-5 rounded-xl border border-slate-600">
                        <span class="text-lg font-semibold text-white flex items-center gap-3">
                            <span id="icon-music"></span> Music
                        </span>
                        <button id="toggle-music" onclick="toggleBgm()" class="w-16 h-8 rounded-full relative transition-colors bg-emerald-500">
                            <div id="toggle-music-knob" class="w-6 h-6 bg-white rounded-full absolute top-1 transition-transform translate-x-9 shadow-sm"></div>
                        </button>
                    </div>

                    <div class="flex justify-between items-center bg-slate-700/50 p-5 rounded-xl border border-slate-600">
                        <span class="text-lg font-semibold text-white flex items-center gap-3">
                            <span id="icon-sfx"></span> Sound Effects
                        </span>
                        <button id="toggle-sfx" onclick="toggleSfx()" class="w-16 h-8 rounded-full relative transition-colors bg-emerald-500">
                            <div id="toggle-sfx-knob" class="w-6 h-6 bg-white rounded-full absolute top-1 transition-transform translate-x-9 shadow-sm"></div>
                        </button>
                    </div>
                </div>

                <button onclick="closeSettings()" class="mt-10 bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xl py-4 px-16 rounded-xl shadow-[0_4px_0_#312e81] active:translate-y-1 active:shadow-none transition-all w-full">
                    Accept
                </button>
            </div>
        </div>

        <!-- Transición de Nivel -->
        <div id="transition-overlay" class="hidden-state absolute inset-0 bg-white/10 backdrop-blur-md flex flex-col items-center justify-center z-40">
           <div class="bg-slate-900/80 p-12 rounded-3xl text-center border border-yellow-400/50 shadow-[0_0_50px_rgba(250,204,21,0.2)] backdrop-blur-xl">
               <h2 class="text-4xl md:text-6xl font-black text-white drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] mb-6 animate-pulse tracking-wide">
                 LEVEL <span id="trans-level" class="text-yellow-400"></span> COMPLETED!
               </h2>
               <p id="trans-next-theme" class="text-xl md:text-2xl text-indigo-100 font-semibold drop-shadow-md bg-white/10 px-8 py-3 rounded-full inline-block border border-white/10">
                 Get ready for the next one...
               </p>
           </div>
        </div>

        <!-- Fin del Juego -->
        <div id="gameover-overlay" class="hidden-state absolute inset-0 bg-rose-950/90 backdrop-blur-xl flex items-center justify-center z-50">
            <div class="bg-white/10 p-10 md:p-14 rounded-[2.5rem] text-center shadow-[0_0_80px_rgba(225,29,72,0.4)] border border-rose-500/30">
                <h2 class="text-5xl font-black text-rose-500 mb-8 uppercase tracking-widest drop-shadow-md">Game Over</h2>
                <div class="bg-black/30 rounded-2xl p-8 mb-10 border border-white/5">
                    <p class="text-sm text-white/60 font-bold uppercase tracking-widest mb-2">Final Score</p>
                    <p id="go-score" class="text-7xl font-black text-white drop-shadow-lg tracking-tighter">0</p>
                    <p id="go-level" class="text-sm text-rose-200 font-semibold mt-6 bg-rose-900/50 py-2 px-4 rounded-full inline-block border border-rose-500/30">You reached Level 1</p>
                </div>
                
                <div class="flex flex-col md:flex-row gap-4">
                    <button onclick="startGame()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-bold text-xl py-4 px-8 rounded-xl shadow-[0_4px_0_#064e3b] active:translate-y-1 active:shadow-none transition-all flex justify-center items-center gap-3">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg> Play Again
                    </button>
                    <button onclick="setGameState('menu')" class="bg-white/10 hover:bg-white/20 text-white font-bold text-xl px-8 py-4 rounded-xl border border-white/10 transition-all flex justify-center items-center gap-2">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg> Menu
                    </button>
                </div>

        // --- TEMAS DE NIVELES ---

        const BALLOON_COLORS = [

        ];

        // --- SISTEMA DE AUDIO ---
        const AudioSys = {
            ctx: null,
            bgmEl: null,
            init: function() {
                // Iniciar sintetizador para efectos de sonido
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
                // Obtener elemento de audio HTML5 para música de fondo
                if (!this.bgmEl) {
                    this.bgmEl = document.getElementById('bg-music');
                    this.bgmEl.volume = 0.5; // Volumen al 50%
                }
            },
            playTone: function(freq, type, duration, vol=0.1) {
                if(!this.ctx || !sfxOn) return;
                try {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                    
                    gain.gain.setValueAtTime(0, this.ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(vol, this.ctx.currentTime + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                    
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start();
                    osc.stop(this.ctx.currentTime + duration);
                } catch(e) {}
            },
            playPop: function() { this.playTone(800, 'sine', 0.15, 0.2); },
            playError: function() { this.playTone(150, 'sawtooth', 0.4, 0.2); },
            playCombo: function(comboCount) {
                const freq = 400 + (comboCount * 100);
                this.playTone(Math.min(freq, 1200), 'triangle', 0.2, 0.15);
            },
            playLevelUp: function() {
                this.playTone(400, 'sine', 0.1, 0.15);
                setTimeout(() => this.playTone(500, 'sine', 0.1, 0.15), 100);
                setTimeout(() => this.playTone(600, 'sine', 0.1, 0.15), 200);
                setTimeout(() => this.playTone(800, 'sine', 0.4, 0.2), 300);
            },
            startBGM: function() {
                if(!this.bgmEl || !bgmOn) return;
                if (this.bgmEl.paused) {
                    this.bgmEl.play().catch(e => console.log("Audio playback blocked by browser:", e));
                }
            },
            stopBGM: function() {
                if(this.bgmEl && !this.bgmEl.paused) {
                    this.bgmEl.pause();
                }
            }
        };

        // --- ESTADO DEL JUEGO ---
        let gameState = 'menu';
        let score = 0;
        let lives = 3;
        let level = 1;
        let timeLeft = 30;
        let currentSubject = "Ready...";
        let balloons = []; 
        let balloonElements = {}; 
        let combo = 0; 
        
        // Ajustes
        let bgmOn = true;
        let sfxOn = true;
        let previousState = 'menu';
        let selectedDifficulty = 1;
        
        const DIFF_SETTINGS = {
            1: { name: "Beginner", time: 45, baseSpeed: 0.15, color: "bg-emerald-600", text: "text-emerald-400" },
            2: { name: "Normal", time: 30, baseSpeed: 0.25, color: "bg-amber-500", text: "text-amber-400" },
            3: { name: "Advanced", time: 20, baseSpeed: 0.40, color: "bg-rose-600", text: "text-rose-400" }
        };

        let gameLoopInterval = null;
        let timerInterval = null;
        let transitionTimeout = null;

        function setDifficulty(levelIndex) {
            selectedDifficulty = levelIndex;
            for (let i = 1; i <= 3; i++) {
                const btn = document.getElementById(`diff-btn-${i}`);
                if (i === selectedDifficulty) {
                    btn.className = `diff-btn flex-1 ${DIFF_SETTINGS[i].color} text-white px-5 py-4 rounded-xl font-bold shadow-[0_4px_0_rgba(0,0,0,0.4)] transition-all transform hover:-translate-y-1 scale-105`;
                    btn.classList.remove('opacity-70');
                } else {
                    btn.className = `diff-btn flex-1 bg-slate-600 opacity-70 text-white px-5 py-4 rounded-xl font-bold transition-all transform hover:-translate-y-1 border border-white/5`;
                }
            }
        }

        // --- ACTUALIZADOR DE INTERFAZ (UI) ---
        function updateUI() {
            const inGame = gameState === 'playing' || gameState === 'paused' || gameState === 'transition' || gameState === 'countdown' || gameState === 'countdown_resume';
            
            document.getElementById('hud').classList.toggle('hidden-state', !inGame);
            document.getElementById('game-canvas').classList.toggle('hidden-state', !inGame);
            document.getElementById('menu-overlay').classList.toggle('hidden-state', gameState !== 'menu');
            document.getElementById('paused-overlay').classList.toggle('hidden-state', gameState !== 'paused');
            document.getElementById('settings-overlay').classList.toggle('hidden-state', gameState !== 'settings');
            document.getElementById('transition-overlay').classList.toggle('hidden-state', gameState !== 'transition');
            document.getElementById('gameover-overlay').classList.toggle('hidden-state', gameState !== 'gameover');
            
            const isCountdown = gameState === 'countdown' || gameState === 'countdown_resume';
            document.getElementById('countdown-overlay').classList.toggle('hidden-state', !isCountdown);

            if (inGame) {
                const currentTheme = LEVEL_THEMES[(level - 1) % LEVEL_THEMES.length];
                document.getElementById('game-wrapper').className = `relative w-full h-screen max-h-screen transition-colors duration-1000 bg-gradient-to-b ${currentTheme.bg}`;

                document.getElementById('hud-level').innerText = level;
                document.getElementById('hud-score').innerText = score;
                document.getElementById('current-subject').innerText = currentSubject;
                
                const diffLabel = document.getElementById('hud-diff');
                diffLabel.innerText = DIFF_SETTINGS[selectedDifficulty].name;
                diffLabel.className = `text-xs font-bold uppercase tracking-widest text-center px-3 py-1.5 rounded-full ${DIFF_SETTINGS[selectedDifficulty].text} bg-black/40 shadow-inner border border-white/10`;
                
                const comboEl = document.getElementById('hud-combo');
                if (combo > 1) {
                    comboEl.innerText = `Combo x${combo}!`;
                    comboEl.classList.add('combo-text');
                    setTimeout(() => comboEl.classList.remove('combo-text'), 400);
                } else {
                    comboEl.innerText = "";
                }

                const timeStr = timeLeft.toString().padStart(2, '0');
                const timeEl = document.getElementById('hud-time');
                timeEl.innerText = `00:${timeStr}`;
                if (timeLeft <= 5 && timeLeft > 0) {
                    timeEl.className = 'text-4xl font-black text-rose-400 animate-pulse drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] tracking-tight';
                } else {
                    timeEl.className = 'text-4xl font-black text-white drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)] tracking-tight';
                }

                const livesContainer = document.getElementById('hud-lives');
                livesContainer.innerHTML = '';
                for (let i = 0; i < 3; i++) {
                    const heart = document.createElement('div');
                    heart.innerHTML = ICONS.heart;
                    heart.className = i < lives ? 'text-rose-500 animate-pulse drop-shadow-md' : 'text-white/20';
                    livesContainer.appendChild(heart);
                }

                const playPauseBtn = document.getElementById('btn-pause-play');
                playPauseBtn.innerHTML = gameState === 'playing' ? ICONS.pause : ICONS.play;
                
                if (isCountdown) {
                    playPauseBtn.onclick = null;
                    playPauseBtn.classList.add('opacity-50', 'cursor-not-allowed');
                } else {
                    playPauseBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    playPauseBtn.onclick = () => setGameState(gameState === 'playing' ? 'paused' : 'playing');
                }
                
                // Actualizar ecualizador visual
                const hudEq = document.getElementById('hud-eq');
                const activeStates = ['playing', 'countdown', 'countdown_resume', 'transition'];
                if (bgmOn && activeStates.includes(gameState)) {
                    hudEq.classList.remove('music-paused');
                } else {
                    hudEq.classList.add('music-paused');

            document.getElementById('icon-music').innerHTML = bgmOn ? ICONS.volume2 : ICONS.volumeX;

            const btnMusic = document.getElementById('toggle-music');

            if (gameState === 'gameover') {
                document.getElementById('go-score').innerText = score;
                document.getElementById('go-level').innerText = `You reached Level ${level} (${DIFF_SETTINGS[selectedDifficulty].name})`;
            }
            if (gameState === 'transition') {
                document.getElementById('trans-level').innerText = level;
                document.getElementById('trans-next-theme').innerText = LEVEL_THEMES[level % LEVEL_THEMES.length].name;
            }

            manageAudio();
        }

        // --- LÓGICA DE MANEJO DE AUDIO ---
        function manageAudio() {
            const activeStates = ['playing', 'countdown', 'countdown_resume', 'transition'];
            // Reproducir solo mientras se está en el flujo activo del juego
            if (activeStates.includes(gameState) && bgmOn) {
                AudioSys.startBGM();
            } else {
                AudioSys.stopBGM();
            }
        }

        // --- SISTEMA DE CUENTA REGRESIVA ---
        function startCountdown(isResume = false) {
            AudioSys.init();
            setGameState(isResume ? 'countdown_resume' : 'countdown');
            
            let count = 3;
            const textEl = document.getElementById('countdown-text');
            
            const animateText = (text, isGo = false) => {
                textEl.innerText = text;
                textEl.classList.remove('animate-pop-in');
                void textEl.offsetWidth; 
                
                if(isGo) {
                    textEl.className = "text-9xl md:text-[12rem] font-black text-emerald-400 drop-shadow-[0_0_40px_rgba(52,211,153,0.9)] animate-pop-in tracking-widest";
                    if(sfxOn) AudioSys.playTone(800, 'sine', 0.4, 0.2); 
                } else {
                    textEl.className = "text-9xl md:text-[12rem] font-black text-yellow-400 drop-shadow-[0_0_30px_rgba(250,204,21,0.8)] animate-pop-in";
                    if(sfxOn) AudioSys.playTone(400, 'sine', 0.1, 0.15); 
                }
            };

            const tick = () => {
                if (gameState !== 'countdown' && gameState !== 'countdown_resume') return; 
                if (count > 0) {
                    animateText(count.toString());
                    count--;
                    setTimeout(tick, 1000);
                } else if (count === 0) {
                    animateText('GO!', true);
                    count--;
                    setTimeout(tick, 1000);
                } else {
                    if (gameState === 'countdown_resume') {
                        setGameState('playing');
                    } else {
                        beginGameRound();
                    }
                }
            };
            tick();
        }

        // --- LÓGICA PRINCIPAL DEL JUEGO ---
        function setGameState(newState) {
            if(gameState === 'playing' && newState !== 'playing') stopLoops();
            
            if (gameState === 'paused' && newState === 'countdown_resume') {
                gameState = newState;
                updateUI();
                startCountdown(true);
                return;
            }

            gameState = newState;
            if (gameState === 'playing') startLoops();
            
            updateUI();
        }

        function startGame() {
            // Activar pantalla completa al primer clic en Jugar
            enterFullScreen(); 

            score = 0;
            lives = 3;
            level = 1;
            combo = 0;
            timeLeft = DIFF_SETTINGS[selectedDifficulty].time;
            currentSubject = "Ready...";
            
            document.getElementById('particles-container').innerHTML = '';
            document.getElementById('floating-texts-container').innerHTML = '';
            document.getElementById('balloons-container').innerHTML = '';
            
            if (AudioSys.bgmEl) {
                AudioSys.bgmEl.currentTime = 0;
            }

            startCountdown(false);
        }

        function beginGameRound() {
            generateRound(level);
            setGameState('playing');
        }

        function generateRound(currentLevel) {
            const dataPool = GRAMMAR_DATA[selectedDifficulty];
            const q = dataPool[Math.floor(Math.random() * dataPool.length)];
            
            const subjEl = document.getElementById('current-subject');
            subjEl.style.transform = 'scale(0.8)';
            subjEl.style.opacity = '0';
            setTimeout(() => {
                currentSubject = q.s;
                subjEl.innerText = currentSubject;
                subjEl.style.transform = 'scale(1)';
                subjEl.style.opacity = '1';
            }, 200);

            const isCorrectIndex = Math.floor(Math.random() * 3);
            const selectedIncorrect = [...q.i].sort(() => 0.5 - Math.random()).slice(0, 2);

            balloons = [];
            let incorrectCounter = 0;

            const shuffledColors = [...BALLOON_COLORS].sort(() => 0.5 - Math.random());
            const xPos = [15, 50, 85].sort(() => 0.5 - Math.random());
            
            const speedCalc = DIFF_SETTINGS[selectedDifficulty].baseSpeed + (currentLevel * 0.08) + (Math.random() * 0.1);

            for (let i = 0; i < 3; i++) {
                const isCorrect = i === isCorrectIndex;
                balloons.push({
                    id: Math.random().toString(36).substr(2, 9),
                    verb: isCorrect ? q.c : selectedIncorrect[incorrectCounter++],
                    isCorrect: isCorrect,
                    x: xPos[i],
                    y: -25 - Math.random() * 20, 
                    speed: speedCalc,
                    colorData: shuffledColors[i]
                });
            }
            renderBalloons();
            updateUI();
        }

        function renderBalloons() {
            const container = document.getElementById('balloons-container');
            container.innerHTML = '';
            balloonElements = {};
            
            balloons.forEach(b => {
                const el = document.createElement('div');
                el.className = 'absolute flex flex-col items-center w-28 md:w-32 balloon-idle';
                el.style.left = `calc(${b.x}% - 3.5rem)`;
                el.style.top = `${b.y}%`;
                
                el.innerHTML = `
                    <div class="w-24 h-32 md:w-28 md:h-36 ${b.colorData.class} rounded-t-full rounded-b-[45%] flex items-center justify-center shadow-[inset_-6px_-6px_15px_rgba(0,0,0,0.2),_0_10px_15px_rgba(0,0,0,0.3)] cursor-pointer transform hover:scale-105 active:scale-95 transition-all relative overflow-hidden group border border-white/20">
                        <div class="absolute top-3 left-3 w-5 h-8 bg-white/30 rounded-full rotate-[30deg] pointer-events-none group-hover:bg-white/40 transition-colors"></div>
                        <span class="text-white font-extrabold text-2xl md:text-3xl drop-shadow-[0_2px_4px_rgba(0,0,0,0.6)] z-10 pointer-events-none px-2 text-center w-full break-words leading-tight tracking-wide">${b.verb}</span>
                    </div>
                    <div class="w-4 h-4 ${b.colorData.class} mt-[-6px] rotate-45 z-0 pointer-events-none shadow-md border-b border-r border-black/10"></div>
                    <div class="w-[2px] h-20 md:h-24 bg-white/40 -mt-1 pointer-events-none"></div>
                `;
                
                el.children[0].onmousedown = (e) => { e.preventDefault(); handleBalloonClick(b.id); };
                el.children[0].ontouchstart = (e) => { e.preventDefault(); handleBalloonClick(b.id); };
                
                container.appendChild(el);
                balloonElements[b.id] = el;
            });
        }

        function createParticles(x, y, hexColor) {
            const container = document.getElementById('particles-container');
            const numParticles = 12;
            for(let i=0; i<numParticles; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.backgroundColor = hexColor;
                p.style.left = `calc(${x}% - 5px)`;
                p.style.top = `${y}%`;
                p.style.width = `${Math.random() * 8 + 6}px`;
                p.style.height = p.style.width;
                
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 60 + 40;
                p.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
                p.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
                
                container.appendChild(p);
                setTimeout(() => p.remove(), 600);
            }
        }

        function handleBalloonClick(id) {
            if (gameState !== 'playing') return;
            const balloon = balloons.find(b => b.id === id);
            if (!balloon) return;

            if (balloon.isCorrect) {
                combo++;
                if (sfxOn) {
                    AudioSys.playPop();
                    setTimeout(() => AudioSys.playCombo(combo), 100);
                }
                
                const pointsEarned = 10 * combo;
                score += pointsEarned;
                
                createParticles(balloon.x, balloon.y + 10, balloon.colorData.hex);
                addFloatingText(balloon.x, balloon.y, `+${pointsEarned}`, 'text-emerald-300 drop-shadow-[0_2px_4px_rgba(0,0,0,0.9)] text-4xl md:text-5xl');
                
                balloons = [];
                renderBalloons(); 
                updateUI();
                
                setTimeout(() => generateRound(level), 200);
                
            } else {
                combo = 0; 
                if (sfxOn) AudioSys.playError();
                lives -= 1;
                
                addFloatingText(balloon.x, balloon.y, 'INCORRECT!', 'text-rose-500 drop-shadow-[0_2px_4px_rgba(0,0,0,0.9)] text-2xl md:text-3xl tracking-widest');
                
                balloons = balloons.filter(b => b.id !== id);
                if (balloonElements[id]) {
                    const el = balloonElements[id];
                    el.style.transition = 'transform 0.5s ease-in, opacity 0.3s';
                    el.style.transform = 'translateY(500px) rotate(45deg)';
                    el.style.opacity = '0';
                    setTimeout(() => { if(el.parentNode) el.remove(); }, 500);
                    delete balloonElements[id];
                }

                updateUI();
                
                if (lives <= 0) {
                    setTimeout(() => setGameState('gameover'), 500);
                }
            }
        }

        function handleMissedCorrect() {
            combo = 0; 
            if (sfxOn) AudioSys.playError();
            lives -= 1;
            
            balloons = [];
            renderBalloons();
            updateUI();
            
            if (lives <= 0) {
                setGameState('gameover');
            } else {
                const subjEl = document.getElementById('current-subject');
                subjEl.innerText = "It got away!";
                subjEl.className = "text-3xl md:text-4xl text-rose-400 font-black tracking-widest drop-shadow-[0_4px_6px_rgba(0,0,0,0.8)] relative z-10 transition-all uppercase";
                
                setTimeout(() => {
                    subjEl.className = "text-5xl md:text-6xl text-white font-black tracking-wide drop-shadow-[0_4px_6px_rgba(0,0,0,0.8)] relative z-10 transition-all";
                    generateRound(level);
                }, 1000);
            }
        }

        function addFloatingText(x, y, text, colorClass) {
            const container = document.getElementById('floating-texts-container');
            const el = document.createElement('div');
            el.className = `absolute font-black animate-float-up pointer-events-none z-40 text-center ${colorClass}`;
            el.style.left = `calc(${x}% - 75px)`;
            el.style.width = '150px';
            el.style.top = `${y}%`;
            el.innerText = text;
            container.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        // --- BUCLES DEL JUEGO ---
        function startLoops() {
            if (!gameLoopInterval) gameLoopInterval = setInterval(gameLoop, 16);
            if (!timerInterval) timerInterval = setInterval(timerLoop, 1000);
        }

        function stopLoops() {
            if (gameLoopInterval) clearInterval(gameLoopInterval);
            if (timerInterval) clearInterval(timerInterval);
            gameLoopInterval = null;
            timerInterval = null;
        }

        function gameLoop() {
            let missedCorrect = false;
            balloons.forEach(b => {
                b.y += b.speed;
                if (b.y > 110) {
                    if (b.isCorrect) missedCorrect = true;
                } else {
                    if (balloonElements[b.id]) balloonElements[b.id].style.top = `${b.y}%`;
                }
            });

            if (missedCorrect) {
                stopLoops();
                handleMissedCorrect();
                if (lives > 0) startLoops(); 
            }
        }

        function timerLoop() {
            timeLeft -= 1;
            if (timeLeft <= 0) {
                timeLeft = 0;
                setGameState('transition');
                handleTransition();
            } else {
                updateUI();
            }
        }

        function handleTransition() {
            if (sfxOn) AudioSys.playLevelUp();
            updateUI(); 
            
            if (transitionTimeout) clearTimeout(transitionTimeout);
            transitionTimeout = setTimeout(() => {
                level += 1;
                timeLeft = DIFF_SETTINGS[selectedDifficulty].time;
                generateRound(level);
                setGameState('playing');
            }, 3000);
        }

        // --- CONTROLES DE AJUSTES ---
        function openSettings() {
            previousState = gameState;
            setGameState('settings');
        }

        function closeSettings() {
            setGameState(previousState === 'settings' ? 'menu' : previousState);
        }

        function toggleBgm() {
            AudioSys.init();
            bgmOn = !bgmOn;
            updateUI();
        }

        function toggleSfx() {
            AudioSys.init();
            sfxOn = !sfxOn;
            updateUI();
        }

        window.onload = () => {
            setDifficulty(1); 
            updateUI();
        };
    </script>
</body>
</html>
